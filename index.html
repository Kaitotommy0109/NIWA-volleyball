    <style>
           .slide-items {
        width: 100%;
        display: flex;
        max-width: 80%;
        margin: auto;
    }

    .slide-items li {
        height: auto;
        margin-right: 10px;
        margin-left:10px;
    }
    .slide-items img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .slick-prev:before,
    .slick-next:before {
        color: black;
    }
    .slick-dots li button:before {
        font-size: 18px;
        top:6px;
    }

    body {
        background: white;
    }

    a {
      color: #000000;
      text-decoration: none;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    .wrapper {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
    }

    .item {
      flex: 0 0 calc(33.333% - 20px);
      margin: 10px;
      }

    /* make images scale within items */
    .item img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* responsive adjustments for smaller screens */
    @media (max-width: 768px) {
      .wrapper {
        flex-direction: column;
        align-items: center;
      }
      .item {
        flex: 1 1 90%;
      }
    }
    </style>
